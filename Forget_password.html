<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="reg.css">

    <script src="jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("#regForm").submit(function(e){
                e.preventDefault();

                var isvalid=true;
                var MoNo=$("#MoNo").val().trim();

                if(!/^\d{10}$/.test(MoNo))
                {
                    $("#MoNoerr").show();
                    isvalid=false
                }
                else
                {
                    $("#MoNoerr").hide();
                }

                var savedMoNo=localStorage.getItem("MoNo")

                if(isvalid)
                {
                    if(MoNo===savedMoNo)
                    {
                        $("#msg").html('<span class="text-success"></span>');
                        setTimeout(function(){
                            window.location.href="otp.html";
                        },1000)
                    }
                    else
                    {
                        $("#msg").html('<span class="text-danger">Invalid Mobile Number !</span>');
                    }
                }
                else
                {
                    $("#msg").html('<span class="text-danger">Invalid Mobile Number !</span>');
                }
                
            })
        })
    </script>
</head>
<body class="bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="head">
                <h3 class="text-center">Forget password</h3>
            </div>
            <form action="" class="p-3" id="regForm">
                
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="MoNo" maxlength="10" placeholder="Mobile Number">
                    <label for="">Enter Number</label>
                    <div class="error" id="MoNoerr">Mobile Number must be 10 Digits...</div>
                </div>
                <button type="submit" class="btn btn-primary form-control mt-3">Get OTP</button>
                <div class="text-center" id="msg"></div>
            </form>
            </div>
            
        </div>
    </div>
</body>
</html>
