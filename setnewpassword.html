<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="reg.css">

    <script src="jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("#regForm").submit(function(e){
                e.preventDefault();

                var isvalid=true;
                var pass=$("#pass").val();
                var cpass=$("#cpass").val();

                if(pass=="")
                {
                    $("#passerr").show();
                    isvalid=false
                }
                else
                {
                    $("#passerr").hide();
                }

                if(cpass!==pass)
                {
                    $("#cpasserr").show();
                    isvalid=false
                }
                else
                {
                    $("#cpasserr").hide();
                }

                if(isvalid)
                {

                    localStorage.setItem("pass",pass)

                    $("#msg").html('<span class="text-success">Successful !</span>');
                    setTimeout(function(){
                        window.location.href="login.html";
                    },1000)
                }
                else
                {
                    $("#msg").html('<span class="text-danger">fail !</span>');
                }
                
            })
        })
    </script>
</head>
<body class="bg">
    <div class="container">
        <div class="row justify-content-center">
            <div class="head">
                <h3 class="text-center">Set New Password</h3>
            </div>
            <form action="" class="p-3" id="regForm">
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="pass" placeholder="password">
                    <label for="">Password</label>
                    <div class="error" id="passerr">Password is Requried...</div>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="cpass" placeholder="c password">
                    <label for="">Confirm Password</label>
                    <div class="error" id="cpasserr">Conifirm Password Doesn't Match...</div>
                </div>
                <button type="submit" class="btn btn-primary form-control mt-3">Submit</button>
                <div class="text-center" id="msg"></div>
            </form>
        </div>
    </div>
</body>
</html>
