<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="bootstrap.min.css">
    <link rel="stylesheet" href="menu.css">
   
    <script src="jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $("#pfname").text(localStorage.getItem("fname"));
            $("#plname").text(localStorage.getItem("lname"));
            $("#pemail").text(localStorage.getItem("email"));
            $("#pMoNo").text(localStorage.getItem("MoNo"));

            $("#b1").click(function(){
                setTimeout(function(){
                    window.location.href="login.html";
                },1000)
            })
        })
    </script>

    <style>
        .profile-container{
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            background: #fff;
            border-radius: 15px;
        }

        .profile-title{
            text-align: center;
            margin-bottom: 20px;
        }

        .profile-info p{
            padding: 10px;
            margin-bottom: 10px;
            border-bottom: 2px solid #ddd;
            font-size: 16px;
        }

        .profile-info span{
            float: right;
            color: #333;
            font-weight: 500;
        }

        .logout-btn{
            margin-top: 20px;
            width: 100%;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <div class="navbar-header">
                <a href="home.html" class="navbar-brand">Drishyam Reality</a>
            </div>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a href="home.html" class="nav-link">Home</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Project</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Lead</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Property</a>
                </li>
            </ul>
            <ul class="navbar-nav navbar-right">
                <li class="nav-item">
                    <a href="" class="nav-link">Help</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Setting</a>
                </li>
                <li class="nav-item">
                    <a href="" class="nav-link">Profile</a>
                </li>
            </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="profile-container">
            <div class="col-12 col-md-6 col-lg-4">
            <h3 class="text-center profile-title">User Profile</h3>

            <div class="profile-info">
                <p><b>First Name : </b> <span id="pfname"></span></p>
                <p><b>Last Name : </b> <span id="plname"></span></p>
                <p><b>Email : </b> <span id="pemail"></span></p>
                <p><b>Mobile Number : </b> <span id="pMoNo"></span></p>
            </div>
        
        <button id="b1" type="submit" class="btn btn-danger w-100 logout-btn" >Logout</button>
        </div>
        </div>
    </div>
     <script src="bootstrap.bundle.min.js"></script>

</body>

</html>
